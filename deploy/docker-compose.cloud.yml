version: "3.9"

# Production cloud deployment with PostgreSQL
# Usage: docker compose -f deploy/docker-compose.cloud.yml up -d

services:
  db:
    image: postgres:16-alpine
    container_name: cybersec-db
    restart: unless-stopped
    volumes:
      - pg_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: cybersec
      POSTGRES_USER: cybersec
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cybersec"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: cybersec-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://cybersec:${DB_PASSWORD:-change-me}@db:5432/cybersec
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?required}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      VIRUSTOTAL_API_KEY: ${VIRUSTOTAL_API_KEY:-}
      ABUSEIPDB_API_KEY: ${ABUSEIPDB_API_KEY:-}
      OTX_API_KEY: ${OTX_API_KEY:-}
      NVD_API_KEY: ${NVD_API_KEY:-}
      DEBUG: "false"
    volumes:
      - app_data:/app/data

  nginx:
    image: nginx:alpine
    container_name: cybersec-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../ssl:/etc/nginx/ssl:ro
    depends_on:
      - app

volumes:
  pg_data:
  app_data:
