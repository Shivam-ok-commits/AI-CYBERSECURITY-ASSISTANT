# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: cybersec-assistant
    env: docker
    repo: https://github.com/YOUR_USER/ai-cybersecurity-assistant
    healthCheckPath: /api/v1/health
    envVars:
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_PATH
        value: /app/data/assistant.db
      - key: DEBUG
        value: "false"
    disk:
      name: data
      mountPath: /app/data
      sizeGB: 1
