# Google Cloud Build — for Cloud Run deployment
# Trigger: push to main builds and deploys to Cloud Run
steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/cybersec-assistant:$COMMIT_SHA
      - -t
      - gcr.io/$PROJECT_ID/cybersec-assistant:latest
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - gcr.io/$PROJECT_ID/cybersec-assistant

  - name: gcr.io/cloud-builders/gcloud
    args:
      - run
      - deploy
      - cybersec-assistant
      - --image
      - gcr.io/$PROJECT_ID/cybersec-assistant:$COMMIT_SHA
      - --region
      - us-central1
      - --platform
      - managed
      - --allow-unauthenticated
      - --memory
      - 512Mi
      - --cpu
      - "1"
      - --min-instances
      - "1"
      - --max-instances
      - "10"
      - --set-env-vars
      - DEBUG=false,DATABASE_PATH=/app/data/assistant.db
      - --set-secrets
      - JWT_SECRET_KEY=jwt-secret:latest
      - --add-volume
      - name=data,type=cloud-storage,bucket=${_BUCKET}
      - --add-volume-mount
      - volume=data,mount-path=/app/data

substitutions:
  _BUCKET: cybersec-assistant-data

timeout: 900s
